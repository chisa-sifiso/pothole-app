# Server
server.port=8081
spring.application.name=pothole-system

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/pothole_db
spring.datasource.username=pothole_user
spring.datasource.password=pothole_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# Set to 'create' on first run to auto-create tables, then change to 'validate'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JPA Auditing
spring.data.jpa.repositories.enabled=true

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# File uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
app.upload.dir=uploads

# AI Service
app.ai.service.url=http://localhost:8000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://13.60.227.32,http://13.60.227.32:80
